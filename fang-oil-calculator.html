<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANG Oil Price → EPS Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4ADE80; --accent-hover: #22C55E; --accent-dim: rgba(74,222,128,0.08);
      --blue: #60A5FA; --purple: #A78BFA; --orange: #FB923C;
      --bg: #0C0F14; --bg-raised: #111520; --card: #151921; --card-hover: #1A2030;
      --text: #E2E8F0; --text-sec: #94A3B8; --text-dim: #64748B;
      --border: #252D3A; --border-hover: #3B4A5E;
      --success: #4ADE80; --danger: #F87171; --warn: #FBBF24;
      --radius: 12px; --radius-sm: 8px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    #root { min-height: 100vh; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 28px; width: 100%; }
    .header {
      background: rgba(12,15,20,0.8); backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border); padding: 14px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner { display: flex; align-items: center; gap: 12px; position: relative; }
    .header-title {
      font-size: 20px; font-weight: 700; color: var(--blue);
      font-family: 'JetBrains Mono', monospace;
    }
    .back-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
      transition: all 0.2s; white-space: nowrap;
    }
    .back-btn:hover { background: var(--card-hover); border-color: var(--border-hover); }
    .validity-badge {
      font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px;
      white-space: nowrap; margin-left: auto;
    }
    .validity-badge.valid { background: rgba(74,222,128,0.12); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
    .validity-badge.expired { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
    .main { flex: 1; padding: 28px 0; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
      animation: fadeUp .4s ease-out both;
    }
    .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .card h4 { font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Input section */
    .wti-input-section { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .wti-slider { flex: 1; min-width: 200px; accent-color: var(--blue); height: 6px; cursor: pointer; }
    .wti-number {
      width: 100px; padding: 8px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-raised); color: var(--text);
      font-size: 16px; font-weight: 600; text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }
    .wti-number:focus { outline: none; border-color: var(--blue); }
    .wti-label { font-size: 13px; color: var(--text-sec); white-space: nowrap; }
    .wti-display { font-size: 28px; font-weight: 700; color: var(--blue); font-family: 'JetBrains Mono', monospace; min-width: 90px; }

    /* Results table */
    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .results-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(37,45,58,0.5); }
    .results-table tr:last-child td { border-bottom: none; }
    .results-table .method-name { font-weight: 600; color: var(--text); }
    .results-table .method-desc { color: var(--text-sec); font-size: 12px; }
    .results-table .eps-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 15px; text-align: right; }
    .results-table .eps-null { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--warn); text-align: right; }

    /* Stats section */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-card {
      background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 14px; text-align: center;
    }
    .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-value.mean { color: var(--accent); }
    .stat-value.sd { color: var(--orange); }

    /* Warning */
    .extrap-warning {

      border-radius: var(--radius-sm); padding: 10px 16px; margin-top: 12px;

    /* Chart canvas */
    .chart-container { position: relative; width: 100%; height: 280px; margin-top: 12px; }

    /* Target price input */
    .target-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .target-input {
      width: 120px; padding: 8px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-raised); color: var(--text);

    .target-label { font-size: 13px; color: var(--text-sec); }

    /* Data checklist */
    .checklist-overlay {
      position: fixed; inset: 0; background: rgba(12,15,20,0.92);

    .checklist-modal {

    .cl-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid rgba(37,45,58,0.5);

    .cl-item:last-child { border-bottom: none; }
    .cl-label { flex: 1; font-size: 13px; }
    .cl-value {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;

    .cl-input {
      width: 120px; padding: 6px 10px; border-radius: var(--radius-sm);

    .cl-input:focus { outline: none; border-color: var(--blue); }
    .cl-section-title { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 0 4px; }
    .cl-btn-row { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .btn {

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--border-hover); background: var(--card-hover); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    .null-hint { color: var(--warn); font-size: 12px; font-style: italic; }

    /* Tooltip */
    .dist-tooltip {
      position: absolute; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px;
      pointer-events: none; z-index: 50; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    /* PE Ratio Cards */
    .pe-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .pe-card {
      border-radius: var(--radius-sm); padding: 16px; cursor: pointer;
      transition: all 0.2s; text-align: center; border: 2px solid transparent;
    }
    .pe-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .pe-card.selected { border-color: #fff; }
    .pe-card .pe-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .pe-card .pe-label { font-size: 11px; font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .pe-card .pe-hint { font-size: 10px; margin-top: 4px; opacity: 0.8; }
    .pe-stock-price {
      background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 16px 20px; margin-top: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .pe-stock-price .price-tag { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
    .pe-stock-price .price-detail { font-size: 12px; color: var(--text-sec); }

    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .pe-grid { grid-template-columns: repeat(2, 1fr); }
      .wti-input-section { flex-direction: column; align-items: stretch; }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ============================================================
// CONSTANTS & DEFAULT PARAMETERS
// ============================================================
const NEXT_EARNINGS_DATE = '2026-05-04';
const STORE_KEY = 'fang_oil_params';
const STORE_TARGET_KEY = 'fang_oil_target';

const DEFAULT_PARAMS = {
  // Method 1
  m1_base_eps_quarterly: 3.64,
  m1_base_wti: 70.3,
  m1_oil_prod_bpd: 475900,
  m1_days_per_year: 365,
  m1_production_tax: 0.07,
  m1_income_tax: 0.23,
  m1_shares: 286000000,

  // Method 2
  m2_oil_kbpd: 503.8,
  m2_ngl_kbpd: 205.0,
  m2_gas_mcfd: 1404000,
  m2_total_boe_kbpd: 942.9,
  m2_LOE: 5.65,
  m2_GPT: 1.41,
  m2_cash_GA: 0.55,
  m2_DDA: 14.80,
  m2_interest_per_boe: 0.55,
  m2_production_tax_pct: 0.07,
  m2_income_tax_rate: 0.23,
  m2_shares: 286000000,
  m2_ngl_to_wti_ratio: 0.305,
  m2_gas_price_fixed: 1.40,
  m2_oil_premium_to_wti: 0.00,
  m2_days_per_quarter: 92,
  m2_bias_correction: 0.848,

  // Method 3 overrides
  m3_gas_price_fixed: 3.00,
  m3_bias_correction: 0.861,

  // Method 4
  m4_cal_intercept: -1.464,
  m4_cal_slope: 1.290,
  m4_gas_price_fixed: 3.00,

  // Method 5
  m5_reg_intercept: -8.490,
  m5_reg_slope: 0.1779,
  m5_r_squared: 0.9431,

  // Method 6 (Chain: Model I → Model II)
  m6_margin_slope: 0.70,
  m6_margin_intercept: -18.55,
  m6_margin_r2: 0.87,
  m6_eps_slope: 0.47,
  m6_eps_intercept: 0.99,
  m6_eps_r2: 0.88,
};

// Param display metadata
const PARAM_META = [
  { section: 'Method 1: Constant ΔWTI' },
  { key: 'm1_base_eps_quarterly', label: 'Base EPS (quarterly)', source: 'Q4 2024 10-K' },
  { key: 'm1_base_wti', label: 'Base WTI ($/bbl)', source: 'Q4 2024 EIA' },
  { key: 'm1_oil_prod_bpd', label: 'Oil Production (bbl/day)', source: 'Q4 2024 10-K' },
  { key: 'm1_days_per_year', label: 'Days per Year' },
  { key: 'm1_production_tax', label: 'Production Tax Rate', source: 'FANG guidance' },
  { key: 'm1_income_tax', label: 'Income Tax Rate', source: 'FANG guidance' },
  { key: 'm1_shares', label: 'Diluted Shares', source: 'Q4 2024 10-K' },

  { section: 'Method 2: Bottom-Up (Oil Only)' },
  { key: 'm2_oil_kbpd', label: 'Oil (kbpd)', source: 'Q3 2025 10-Q' },
  { key: 'm2_ngl_kbpd', label: 'NGL (kbpd)', source: 'Q3 2025 10-Q' },
  { key: 'm2_gas_mcfd', label: 'Gas (Mcf/day)', source: 'Q3 2025 10-Q' },
  { key: 'm2_total_boe_kbpd', label: 'Total BOE (kbpd)', source: 'Q3 2025 10-Q' },
  { key: 'm2_LOE', label: 'LOE ($/BOE)', source: 'Q3 2025 10-Q' },
  { key: 'm2_GPT', label: 'GPT ($/BOE)', source: 'Q3 2025 10-Q' },
  { key: 'm2_cash_GA', label: 'Cash G&A ($/BOE)', source: 'Q3 2025 10-Q' },
  { key: 'm2_DDA', label: 'DD&A ($/BOE)', source: '2025 guidance' },
  { key: 'm2_interest_per_boe', label: 'Interest ($/BOE)', source: 'Estimated' },
  { key: 'm2_production_tax_pct', label: 'Production Tax %' },
  { key: 'm2_income_tax_rate', label: 'Income Tax Rate' },
  { key: 'm2_shares', label: 'Diluted Shares' },
  { key: 'm2_ngl_to_wti_ratio', label: 'NGL/WTI Ratio', source: 'Q3 2025' },
  { key: 'm2_gas_price_fixed', label: 'Gas Price ($/Mcf)', source: 'Q3 2025 realized' },
  { key: 'm2_oil_premium_to_wti', label: 'Oil Premium to WTI' },
  { key: 'm2_days_per_quarter', label: 'Days per Quarter' },
  { key: 'm2_bias_correction', label: 'Bias Correction', source: '5Q backtest' },

  { section: 'Method 3: Bottom-Up (Oil + Gas $3)' },
  { key: 'm3_gas_price_fixed', label: 'Gas Price ($/Mcf)', source: 'Assumed $3' },
  { key: 'm3_bias_correction', label: 'Bias Correction', source: '5Q backtest' },

  { section: 'Method 4: Regression Calibrated' },
  { key: 'm4_cal_intercept', label: 'Calibration Intercept', source: '5Q regression' },
  { key: 'm4_cal_slope', label: 'Calibration Slope', source: '5Q regression' },
  { key: 'm4_gas_price_fixed', label: 'Gas Price ($/Mcf)' },

  { section: 'Method 5: Historical OLS Regression' },
  { key: 'm5_reg_intercept', label: 'Regression Intercept', source: 'Post-Endeavor OLS' },
  { key: 'm5_reg_slope', label: 'Regression Slope', source: 'Post-Endeavor OLS' },
  { key: 'm5_r_squared', label: 'R²', source: 'Post-Endeavor OLS' },

  { section: 'Method 6: Barrel-to-Earnings Chain' },
  { key: 'm6_margin_slope', label: 'Model I Slope (WTI→Margin)', source: 'FY22-25 OLS, R²=0.87' },
  { key: 'm6_margin_intercept', label: 'Model I Intercept', source: 'FY22-25 OLS' },
  { key: 'm6_margin_r2', label: 'Model I R²', source: 'FY22-25 OLS' },
  { key: 'm6_eps_slope', label: 'Model II Slope (Margin→EPS)', source: 'FY22-25 OLS, R²=0.88' },
  { key: 'm6_eps_intercept', label: 'Model II Intercept', source: 'FY22-25 OLS' },
  { key: 'm6_eps_r2', label: 'Model II R²', source: 'FY22-25 OLS' },
];

// ============================================================
// LOCAL STORAGE HELPERS
// ============================================================
function getStoredParams() {
  try { const s = localStorage.getItem(STORE_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function setStoredParams(p) { localStorage.setItem(STORE_KEY, JSON.stringify(p)); }
function getStoredTarget() {
  try { const s = localStorage.getItem(STORE_TARGET_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function setStoredTarget(t) { localStorage.setItem(STORE_TARGET_KEY, JSON.stringify(t)); }

// ============================================================
// CALCULATION ENGINE
// ============================================================
function calcMethod1(wti, p) {
  const sensitivity = p.m1_oil_prod_bpd * p.m1_days_per_year * (1 - p.m1_production_tax) * (1 - p.m1_income_tax) / p.m1_shares;
  const delta = wti - p.m1_base_wti;
  return (p.m1_base_eps_quarterly * 4) + (sensitivity * delta);
}

function calcBU(wti, p, gasPrice, biasCorrection, applyBias) {
  const oilPrice = wti + p.m2_oil_premium_to_wti;
  const nglPrice = wti * p.m2_ngl_to_wti_ratio;
  const dq = p.m2_days_per_quarter;

  const qOilRev = p.m2_oil_kbpd * 1000 * dq * oilPrice;
  const qNglRev = p.m2_ngl_kbpd * 1000 * dq * nglPrice;
  const qGasRev = p.m2_gas_mcfd * dq * gasPrice;
  const qTotalRev = qOilRev + qNglRev + qGasRev;

  const qTotalBoe = p.m2_total_boe_kbpd * 1000 * dq;
  const qProdTax = p.m2_production_tax_pct * qTotalRev;
  const qCashCosts = (p.m2_LOE + p.m2_GPT + p.m2_cash_GA) * qTotalBoe;
  const qDDA = p.m2_DDA * qTotalBoe;
  const qInterest = p.m2_interest_per_boe * qTotalBoe;

  const qEBITDA = qTotalRev - qProdTax - qCashCosts;
  const qEBT = qEBITDA - qDDA - qInterest;
  const qNetIncome = qEBT > 0 ? qEBT * (1 - p.m2_income_tax_rate) : qEBT;
  const qEPS = qNetIncome / p.m2_shares;

  if (applyBias) return qEPS * 4 * biasCorrection;
  return qEPS; // raw quarterly for method 4
}

function calcMethod2(wti, p) {
  return calcBU(wti, p, p.m2_gas_price_fixed, p.m2_bias_correction, true);
}

function calcMethod3(wti, p) {
  return calcBU(wti, p, p.m3_gas_price_fixed, p.m3_bias_correction, true);
}

function calcMethod4(wti, p) {
  const rawQ = calcBU(wti, p, p.m4_gas_price_fixed, 0, false);
  const calibratedQ = p.m4_cal_intercept + p.m4_cal_slope * rawQ;
  return calibratedQ * 4;
}

function calcMethod5(wti, p) {
  const qEPS = p.m5_reg_intercept + p.m5_reg_slope * wti;
  return qEPS * 4;
}

function calcMethod6(wti, p) {
  // Chain: WTI → Margin (Model I) → EPS (Model II)
  const margin = p.m6_margin_slope * wti + p.m6_margin_intercept;
  const eps = p.m6_eps_slope * margin + p.m6_eps_intercept;
  return eps; // already annual
}

function calcAll(wti, p) {
  const m1 = calcMethod1(wti, p);
  const m2 = calcMethod2(wti, p);
  const m3 = calcMethod3(wti, p);
  const m4 = calcMethod4(wti, p);
  const m5 = calcMethod5(wti, p);
  const m6 = calcMethod6(wti, p);
  return { methods: [m1, m2, m3, m4, m5, m6] };
}

// t-distribution critical values (97.5% quantile) by df
const T_CRIT = { 1: 12.706, 2: 4.303, 3: 3.182, 4: 2.776, 5: 2.571, 6: 2.447, 7: 2.365, 8: 2.306, 9: 2.262, 10: 2.228, 15: 2.131, 20: 2.086, 30: 2.042 };
function tCritVal(df) {
  if (T_CRIT[df]) return T_CRIT[df];
  // interpolate or fallback to 1.96 for large df
  if (df > 30) return 1.96;
  const keys = Object.keys(T_CRIT).map(Number).sort((a,b) => a-b);
  for (let i = 0; i < keys.length - 1; i++) {
    if (df > keys[i] && df < keys[i+1]) {
      const frac = (df - keys[i]) / (keys[i+1] - keys[i]);
      return T_CRIT[keys[i]] * (1 - frac) + T_CRIT[keys[i+1]] * frac;
    }
  }
  return 1.96;
}

function calcStats(values) {
  const n = values.length;
  if (n === 0) return null;
  if (n === 1) return { mean: values[0], sd: 0, ci68Low: values[0], ci68High: values[0], ci95Low: values[0], ci95High: values[0], n };
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const variance = values.reduce((a, v) => a + (v - mean) ** 2, 0) / (n - 1);
  const sd = Math.sqrt(variance);
  const ci68Low = mean - sd;
  const ci68High = mean + sd;
  const df = n - 1;
  const tVal = tCritVal(df);
  const se = sd / Math.sqrt(n);
  const ci95Low = mean - tVal * se;
  const ci95High = mean + tVal * se;
  return { mean, sd, ci68Low, ci68High, ci95Low, ci95High, n };
}

// t-distribution helpers
function lnGamma(z) {
  // Lanczos approximation for ln(Gamma(z))
  const g = 7;
  const c = [0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,
    -176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  let x = c[0];
  for (let i = 1; i < g + 2; i++) x += c[i] / (z + i);
  const t = z + g + 0.5;
  return 0.5 * Math.log(2 * Math.PI) + (z + 0.5) * Math.log(t) - t + Math.log(x / z);
}

function tPDF(t, df) {
  // Standard t-distribution PDF
  const coeff = Math.exp(lnGamma((df + 1) / 2) - lnGamma(df / 2)) / Math.sqrt(df * Math.PI);
  return coeff * Math.pow(1 + t * t / df, -(df + 1) / 2);
}

function tPDFScaled(x, mean, sd, df) {
  // Scaled t-distribution: location=mean, scale=sd
  if (sd === 0) return x === mean ? 1 : 0;
  const t = (x - mean) / sd;
  return tPDF(t, df) / sd;
}

function tCDFStandard(t, df) {
  // Regularized incomplete beta function approach for t-distribution CDF
  if (df <= 0) return 0.5;
  const x = df / (df + t * t);
  const a = df / 2;
  const b = 0.5;
  // Compute regularized incomplete beta Ix(a, b) using continued fraction
  let ibeta = incompleteBeta(x, a, b);
  return t >= 0 ? 1 - 0.5 * ibeta : 0.5 * ibeta;
}

function betaCF(x, a, b) {
  // Continued fraction for regularized incomplete beta (Numerical Recipes)
  const maxIter = 200;
  const eps = 1e-12;
  const qab = a + b;
  const qap = a + 1;
  const qam = a - 1;
  let c = 1;
  let d = 1 - qab * x / qap;
  if (Math.abs(d) < 1e-30) d = 1e-30;
  d = 1 / d;
  let h = d;
  for (let m = 1; m <= maxIter; m++) {
    const m2 = 2 * m;
    // even step
    let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
    d = 1 + aa * d; if (Math.abs(d) < 1e-30) d = 1e-30; d = 1 / d;
    c = 1 + aa / c; if (Math.abs(c) < 1e-30) c = 1e-30;
    h *= d * c;
    // odd step
    aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
    d = 1 + aa * d; if (Math.abs(d) < 1e-30) d = 1e-30; d = 1 / d;
    c = 1 + aa / c; if (Math.abs(c) < 1e-30) c = 1e-30;
    const del = d * c;
    h *= del;
    if (Math.abs(del - 1) < eps) break;
  }
  return h;
}

function incompleteBeta(x, a, b) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  const lnBeta = lnGamma(a) + lnGamma(b) - lnGamma(a + b);
  const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b - lnBeta) / a;
  if (x < (a + 1) / (a + b + 2)) {
    return front * betaCF(x, a, b);
  } else {
    return 1 - Math.exp(Math.log(1 - x) * b + Math.log(x) * a - lnBeta) / b * betaCF(1 - x, b, a);
  }
}

function tCDFScaled(x, mean, sd, df) {
  if (sd === 0) return x >= mean ? 1 : 0;
  const t = (x - mean) / sd;
  return tCDFStandard(t, df);
}

function fmtNum(n, dec = 2) {
  if (n == null || isNaN(n)) return 'N/A';
  return n.toFixed(dec);
}

function TDistChart({ mean, sd, df, targetEPS, onPercentile }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || sd === 0 || df < 1) return;

    const ctx = canvasRef.current.getContext('2d');
    if (chartRef.current) chartRef.current.destroy();

    // Generate points for the t-distribution curve
    const lo = mean - 4.5 * sd;
    const hi = mean + 4.5 * sd;
    const step = (hi - lo) / 200;
    const labels = [];
    const data = [];
    for (let x = lo; x <= hi; x += step) {
      labels.push(x);
      data.push(tPDFScaled(x, mean, sd, df));
    }

    // Red dot position
    const dotX = targetEPS != null ? targetEPS : mean;
    const pct = tCDFScaled(dotX, mean, sd, df) * 100;
    if (onPercentile) onPercentile(pct);

    // Find closest index for the dot
    let dotIdx = 0;
    let minDist = Infinity;
    labels.forEach((lbl, i) => {
      const d = Math.abs(lbl - dotX);
      if (d < minDist) { minDist = d; dotIdx = i; }
    });

    const pointRadii = labels.map((_, i) => i === dotIdx ? 6 : 0);
    const pointBgColors = labels.map((_, i) => i === dotIdx ? '#F87171' : 'transparent');
    const pointBorderColors = labels.map((_, i) => i === dotIdx ? '#F87171' : 'transparent');

    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 't-distribution (df=' + df + ')',
          data,
          borderColor: '#60A5FA',
          backgroundColor: 'rgba(96,165,250,0.08)',
          fill: true,
          tension: 0.4,
          pointRadius: pointRadii,
          pointBackgroundColor: pointBgColors,
          pointBorderColor: pointBorderColors,
          pointHoverRadius: pointRadii.map(r => r > 0 ? 8 : 0),
          pointHitRadius: pointRadii.map(r => r > 0 ? 12 : 0),
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            labels: { color: '#94A3B8', font: { size: 11 }, boxWidth: 0,
              generateLabels: () => [{ text: 't-distribution (df = ' + df + ')', fontColor: '#94A3B8', fillStyle: 'transparent', strokeStyle: 'transparent' }]
            },
          },
          tooltip: {
            enabled: true,
            filter: (item) => item.dataIndex === dotIdx,
            callbacks: {
              title: () => targetEPS != null ? 'Target EPS' : 'Mean EPS',
              label: (ctx) => {
                const eps = labels[ctx.dataIndex];
                const percentile = tCDFScaled(eps, mean, sd, df) * 100;
                return [`EPS: $${fmtNum(eps)}`, `Percentile: ${fmtNum(percentile, 1)}%`];
              },
            },
          },
        },
        scales: {
          x: {
            type: 'linear',
            title: { display: true, text: 'Annual EPS ($)', color: '#94A3B8', font: { size: 11 } },
            ticks: { callback: v => '$' + fmtNum(v, 0), color: '#64748B', maxTicksLimit: 10 },
            grid: { display: false },
          },
          y: {
            title: { display: true, text: 'Probability Density', color: '#94A3B8', font: { size: 11 } },
            ticks: { display: false },
            grid: { color: 'rgba(37,45,58,0.5)' },
          },
        },
      },
    });

    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [mean, sd, df, targetEPS]);

  if (sd === 0) {
    return <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-dim)' }}>Standard deviation is 0 — cannot render distribution</div>;
  }

  return (
    <div style={{ position: 'relative' }}>
      <div className="chart-container">
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
}

function TargetPriceSection({ mean, sd, df, params }) {
  // Slider range: mean ± 4sd
  const sliderMin = Math.floor((mean - 4 * sd) * 2) / 2;

  const [targetPrice, setTargetPrice] = useState(() => {
    const stored = getStoredTarget();

  });

      setStoredTarget({ targetPrice });
    }
  }, [targetPrice]);

    setTargetPrice(v.toFixed(1));
  }

  function handleInputChange(val) {
    setTargetPrice(val);

  // Clamp slider display value

  return (

              </td>
              <td className="method-name">{m.name}</td>
              <td className="method-desc">{m.desc}</td>
              <td className="eps-value" style={{ color: results.methods[i] >= 0 ? 'var(--accent)' : 'var(--danger)' }}>
                ${fmtNum(results.methods[i])}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12, marginTop: 12 }}>
        {error && <span style={{ fontSize: 12, color: 'var(--danger)' }}>You must choose at least one method</span>}
        <button
          className={`btn btn-sm ${error ? '' : 'btn-primary'}`}
          style={error ? { background: 'var(--danger)', color: '#fff', border: 'none' } : {}}
          onClick={handleSave}
        >
          {dirty ? 'Save Selection' : 'Saved'}
        </button>
      </div>
    </div>
  );
}

function StatsPanel({ stats }) {
  if (!stats) return null;
  return (
    <div className="card">
      <h3>Statistical Summary <span style={{ fontSize: 12, fontWeight: 400, color: 'var(--text-dim)' }}>(n={stats.n} method{stats.n > 1 ? 's' : ''} selected)</span></h3>
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">Mean EPS</div>
          <div className="stat-value mean">${fmtNum(stats.mean)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Std Dev</div>
          <div className="stat-value sd">{stats.n > 1 ? '$' + fmtNum(stats.sd) : 'N/A (n=1)'}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">68% CI</div>
          <div className="stat-value ci">{stats.n > 1 ? '$' + fmtNum(stats.ci68Low) + ' — $' + fmtNum(stats.ci68High) : 'N/A'}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">95% CI (t, df={stats.n > 1 ? stats.n - 1 : '—'})</div>
          <div className="stat-value ci">{stats.n > 1 ? '$' + fmtNum(stats.ci95Low) + ' — $' + fmtNum(stats.ci95High) : 'N/A'}</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [wti, setWti] = useState(70);
  const [params, setParams] = useState(() => {
    const stored = getStoredParams();
    return stored ? { ...DEFAULT_PARAMS, ...stored } : { ...DEFAULT_PARAMS };
  });
  const [showChecklist, setShowChecklist] = useState(false);
  const [showDoc, setShowDoc] = useState(false);
  const numMethods = METHOD_INFO.length;
  const [selected, setSelected] = useState(() => {
    const stored = getStoredSelection();
    if (stored && stored.length === numMethods) return stored;
    return Array(numMethods).fill(true);
  });

  // Check if any required param is missing/NaN
  const hasNull = useMemo(() => {
    return Object.keys(DEFAULT_PARAMS).some(k => params[k] == null || isNaN(params[k]));
  }, [params]);

  const results = useMemo(() => {
    if (hasNull) return null;
    return calcAll(wti, params);
  }, [wti, params, hasNull]);

  // Stats based on selected methods only
  const stats = useMemo(() => {
    if (!results) return null;
    const values = results.methods.filter((_, i) => selected[i]);
    if (values.length === 0) return null;
    return calcStats(values);
  }, [results, selected]);

  const outOfRange = wti < 55 || wti > 75;

  function handleWtiChange(val) {
    const n = parseFloat(val);
    if (!isNaN(n)) setWti(Math.max(40, Math.min(120, n)));
  }

  function handleSaveParams(newParams) {
    setParams(newParams);
    setStoredParams(newParams);
    setShowChecklist(false);
  }

  function handleSaveSelection(sel) {
    setSelected(sel);
    setStoredSelection(sel);
  }

  return (
    <div className="app">
      {showChecklist && (
        <DataChecklist params={params} onSave={handleSaveParams} onClose={() => setShowChecklist(false)} />
      )}
      {showDoc && <DocModal onClose={() => setShowDoc(false)} />}
      <header className="header">
        <div className="container header-inner">
          <button className="back-btn" onClick={() => window.location.href = 'financial-calculator.html'}>
            &larr; Back to Inventory
          </button>
          <span className="header-title">FANG Oil → EPS</span>
          <button className="btn btn-outline btn-sm" onClick={() => setShowChecklist(true)}>
            Data Checklist
          </button>
          <button className="btn btn-outline btn-sm" onClick={() => setShowDoc(true)}>
            Documentation
          </button>
          <ValidityBadge />
        </div>
      </header>

      <main className="main">
        <div className="container">
          {/* Product description */}
          <div className="card" style={{ borderLeft: '3px solid var(--blue)' }}>
            <h3 style={{ marginBottom: 8 }}>Diamondback Energy (FANG) — Oil Price → EPS Calculator</h3>
            <p style={{ fontSize: 13, color: 'var(--text-sec)', margin: 0 }}>
              Enter a WTI crude oil price to estimate FANG's annualized EPS using {numMethods} independent methods.
              Select which methods to include in the statistical summary below.
            </p>
          </div>

          {/* WTI Input */}
          <div className="card">
            <h3>WTI Crude Oil Price Input</h3>
            <div className="wti-input-section">
              <span className="wti-label">$40</span>
              <input
                type="range" min="40" max="120" step="0.5" value={wti}
                className="wti-slider"
                onChange={e => handleWtiChange(e.target.value)}
              />
              <span className="wti-label">$120</span>
              <input
                type="number" min="40" max="120" step="0.5" value={wti}
                className="wti-number"
                onChange={e => handleWtiChange(e.target.value)}
              />
              <span className="wti-display">${fmtNum(wti, 1)}</span>
            </div>
            {outOfRange && (
              <div className="extrap-warning">
                <span>⚠</span> Oil price is outside the $55–$75 historical backtest range. Extrapolation risk increases.
              </div>
            )}
          </div>

          {/* Results */}
          <ResultsTable results={results} hasNull={hasNull} selected={selected} onSaveSelection={handleSaveSelection} />

          {/* Stats */}
          {stats && <StatsPanel stats={stats} />}

          {/* Normal Distribution + Target */}
          {stats && stats.n > 1 && (
            <TargetPriceSection mean={stats.mean} sd={stats.sd} df={stats.n - 1} params={params} />
          )}
          {stats && stats.n === 1 && (
            <div className="card">
              <h3>EPS Distribution & Target</h3>
              <p style={{ fontSize: 13, color: 'var(--text-dim)' }}>Select at least 2 methods to generate the normal distribution chart.</p>
            </div>
          )}

          {/* PE Ratio & Stock Price */}
          {stats && <PERatioSection meanEPS={stats.mean} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
